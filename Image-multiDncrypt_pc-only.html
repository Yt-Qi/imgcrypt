    <style>

            border: 1px solid #C7D2FE;

        .status-msg.error {

            border-radius: 8px;

<body>

<div class="container">
    <h1>🔐 本地图片批量解密工具</h1>

    <div class="form-group">
        <label for="password">安全密码（未嵌入密码时填写）</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="输入密码，若密码已嵌入则无需手动输入" maxlength="25">
            <span class="toggle-pwd-vis" id="togglePwd"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
        </div>
    </div>

    <div class="advanced-toggle" id="advancedToggle">
        <span class="arrow" id="advArrow">▶</span>
        高级选项
    </div>
    <div class="advanced-panel" id="advancedPanel">
        <div class="form-group">
            <label for="blockSize">分块大小（默认10像素）</label>
            <input type="number" id="blockSize" value="10" min="2" max="100" step="1"
                onkeydown="if(['e','E','.','+','-'].includes(event.key))event.preventDefault()">
            <div style="font-size:0.75rem;color:#9CA3AF;margin-top:4px;">数值需与加密时一致；若已嵌入密码，通常无需修改</div>
        </div>
    </div>

    <label class="file-upload" id="fileUploadArea">
        <input type="file" id="imageInput" accept="image/*" multiple>
        <div id="uploadText">点击此处选择图片（可多选）或拖拽图片到此处<br>
            <span style="font-size:0.8rem;color:#6b7280;">支持批量导入多张加密图片</span>
        </div>
    </label>

    <div class="file-list" id="fileList">
        <div class="file-list-header">
            <span id="fileListTitle">待解密图片</span>
            <button class="clear-list-btn" id="clearListBtn">清空列表</button>
        </div>
        <div id="fileListBody"></div>
    </div>

    <div id="loading">⏳ 正在处理中，请稍候...</div>

        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="btn-row">
        <button class="btn" id="processBtn">🔐 开始批量解密</button>
        <button class="btn" id="downloadAllBtn" style="background-color:#10B981;display:none;">⬇️ 下载解密压缩包</button>
    </div>

    <div class="tips">
        <b>📌 注意事项：</b><br>
        1. 基于特定算法解密，全程本地运行。您的图片和使用记录不会被保存或泄露。<br>
        2. 需要使用 PNG 格式的加密图片。若图片经过压缩或格式转换，会因为画质损失导致无法解密还原。<br>
        3. 若加密时开启了"嵌入密码"，批量解密会逐张自动识别嵌入密码，无需手动输入。<br>
        4. 批量解密：一次性导入多张图片，解密后可一键下载压缩包。<br>
    </div>

    <footer class="site-footer">
        <div class="footer-divider"></div>
        <p>Copyright © 2026 柒璃. 保留所有权利。</p>
        <p style="color:#a1a1a6;">本地安全 · 隐私至上</p>
    </footer>
</div>

<script>
// ===== 魔术标记与数据格式 =====
const MAGIC = [0xC7, 0xE3, 0xA5];

// 文件列表：每项 { id, file, name, thumbUrl, img, status, outputDataURL }
let fileItems = [];
let itemIdCounter = 0;

	function bytesToString(bytes) { return new TextDecoder().decode(new Uint8Array(bytes)); }

	function decodePayloadFromPixels(imageData, startY, width, maxRows) {
	    const bytes = [];
	    for (let row = 0; row < maxRows; row++) {
	        for (let x = 0; x < width; x++) {
	            const idx = ((startY + row) * width + x) * 4;
	            bytes.push(imageData.data[idx]);
	            bytes.push(imageData.data[idx + 1]);
	            bytes.push(imageData.data[idx + 2]);
	        }
	    }
	    return bytes;
	}

	function tryExtractFromImage(img) {
	    const canvas = document.createElement('canvas');
	    canvas.width = img.width;
	    canvas.height = img.height;
	    const ctx = canvas.getContext('2d');
	    ctx.drawImage(img, 0, 0);
	    const imgData = ctx.getImageData(0, 0, img.width, img.height);
	    const maxScanRows = Math.min(10, img.height);

	    for (let tryRows = 1; tryRows <= maxScanRows; tryRows++) {
	        const startY = img.height - tryRows;
	        const bytes = decodePayloadFromPixels(imgData, startY, img.width, tryRows);

	        if (bytes[0] === MAGIC[0] && bytes[1] === MAGIC[1] && bytes[2] === MAGIC[2]) {
	            const origW = (bytes[3] << 8) | bytes[4];
	            const origH = (bytes[5] << 8) | bytes[6];
	            const blockSize = (bytes[7] << 8) | bytes[8];
	            const pwdLen = bytes[9];

	            if (pwdLen === 0 || pwdLen > 200) continue;
	            if (blockSize < 2 || blockSize > 1000) continue;
	            if (origW <= 0 || origH <= 0 || origW > 20000 || origH > 20000) continue;

	            const totalLen = 10 + pwdLen + 1;
	            if (totalLen > bytes.length) continue;

	            let checksum = 0;
	            for (let i = 0; i < totalLen - 1; i++) checksum ^= bytes[i];
	            if (checksum !== bytes[totalLen - 1]) continue;

	            const cols = Math.ceil(origW / blockSize);
	            const rows = Math.ceil(origH / blockSize);
	            const padW = cols * blockSize;
	            const padH = rows * blockSize;

	            if (img.width !== padW) continue;
	            if (img.height !== padH + tryRows) continue;

	            const pwd = bytesToString(bytes.slice(10, 10 + pwdLen));

	            return {
	                password: pwd,
	                blockSize: blockSize,
	                origWidth: origW,
	                origHeight: origH,
	                padWidth: padW,
	                padHeight: padH,
	                extraRows: tryRows
	            };
	        }
	    }
	    return null;
	}

// ===== 哈希与 PRNG =====
function hashCode(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash = hash & hash;
    }
    return hash;
}

function mulberry32(a) {
    return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}

function generateShuffleIndices(password, totalBlocks) {
    const indices = Array.from({length: totalBlocks}, (_, i) => i);
    const prng = mulberry32(hashCode(password));
    for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(prng() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices;
}

// ===== 高级选项 =====
document.getElementById('advancedToggle').addEventListener('click', function() {
    document.getElementById('advancedPanel').classList.toggle('open');
    document.getElementById('advArrow').classList.toggle('open');
});

// ===== 密码显隐 =====
document.getElementById('togglePwd').addEventListener('click', function() {
    const inp = document.getElementById('password');
    if (inp.type === 'password') {
        inp.type = 'text';
        this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    } else {
        inp.type = 'password';
        this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }
});

// ===== 文件添加 =====
function addFiles(files) {
    if (!files || !files.length) return;
    const imgs = Array.from(files).filter(f => f.type && f.type.startsWith('image/'));
    if (!imgs.length) {
        alert('请选择图片文件');
        return;
    }

    imgs.forEach(file => {
        const id = ++itemIdCounter;
        const item = {
            id,
            file,
            name: file.name,
            thumbUrl: URL.createObjectURL(file),
            img: null,
            status: 'pending',
	            statusText: '等待解密',
            outputDataURL: null
        };
        fileItems.push(item);

        // 预加载图像
        const img = new Image();
        img.onload = () => { item.img = img; };
        img.src = item.thumbUrl;
    });

    renderFileList();
    hideStatus();
    document.getElementById('downloadAllBtn').style.display = 'none';
}

function renderFileList() {
    const listEl = document.getElementById('fileList');
    const bodyEl = document.getElementById('fileListBody');
    const titleEl = document.getElementById('fileListTitle');

    if (!fileItems.length) {
        listEl.classList.remove('show');
	        document.getElementById('uploadText').innerHTML = '点击此处选择图片（可多选）或拖拽图片到此处<br><span style="font-size:0.8rem;color:#6b7280;">支持批量导入多张加密图片</span>';
        return;
    }

    listEl.classList.add('show');
	    titleEl.textContent = `待解密图片（共 ${fileItems.length} 张）`;
	    document.getElementById('uploadText').innerHTML = `✅ 已添加 ${fileItems.length} 张图片（点击可继续添加）<br><span style="font-size:0.8rem;color:#6b7280;">支持批量导入多张加密图片</span>`;

    bodyEl.innerHTML = '';
    fileItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
            <img class="file-thumb" src="${item.thumbUrl}" alt="">
            <div class="file-info">
                <div class="file-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div>
                <div class="file-status ${item.status}">${escapeHtml(item.statusText)}</div>
            </div>
            <button class="remove-btn" data-id="${item.id}" title="移除">✕</button>
        `;
        bodyEl.appendChild(div);
    });

    bodyEl.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = parseInt(this.getAttribute('data-id'));
            removeItem(id);
        });
    });
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function removeItem(id) {
    const idx = fileItems.findIndex(it => it.id === id);
    if (idx >= 0) {
        try { URL.revokeObjectURL(fileItems[idx].thumbUrl); } catch(e){}
        fileItems.splice(idx, 1);
    }
    renderFileList();
}

document.getElementById('clearListBtn').addEventListener('click', function() {
    if (!fileItems.length) return;
    if (!confirm('确定清空所有已添加的图片吗？')) return;
    fileItems.forEach(it => { try { URL.revokeObjectURL(it.thumbUrl); } catch(e){} });
    fileItems = [];
    renderFileList();
    hideStatus();
    document.getElementById('downloadAllBtn').style.display = 'none';
});

document.getElementById('imageInput').addEventListener('change', function(e) {
    addFiles(e.target.files);
    e.target.value = '';
});

// ===== 拖拽上传 =====
(function initDragUpload() {
    const uploadArea = document.getElementById('fileUploadArea');
    let dragDepth = 0;

    uploadArea.addEventListener('dragenter', function(e) {
        e.preventDefault(); e.stopPropagation();
        dragDepth++;
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault(); e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', function(e) {
        e.preventDefault(); e.stopPropagation();
        dragDepth--;
        if (dragDepth <= 0) { dragDepth = 0; uploadArea.classList.remove('dragover'); }
    });
    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation();
        dragDepth = 0;
        uploadArea.classList.remove('dragover');
        const files = e.dataTransfer && e.dataTransfer.files;
        addFiles(files);
    });
})();

// ===== 状态 =====
function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
}
function hideStatus() {
    document.getElementById('statusMsg').className = 'status-msg';
}

// ===== 下载辅助 =====
	function dataURLToBlob(dataURL) {
	    const arr = dataURL.split(',');
	    const mimeMatch = arr[0].match(/data:(.*?);base64/);
	    const mime = mimeMatch ? mimeMatch[1] : 'image/png';
    const byteString = atob(arr[1]);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
	    return new Blob([ab], { type: mime });
	}

	function dataURLToBytes(dataURL) {
	    const arr = dataURL.split(',');
	    const byteString = atob(arr[1]);
	    const bytes = new Uint8Array(byteString.length);
	    for (let i = 0; i < byteString.length; i++) bytes[i] = byteString.charCodeAt(i);
	    return bytes;
	}

	function sanitizeFileName(name) {
	    const clean = String(name || 'image')
	        .replace(/[\\/:*?"<>|]+/g, '_')
	        .replace(/\s+/g, ' ')
	        .trim();
	    return clean || 'image';
	}

	function getUniqueZipName(originalName, suffix, usedNames) {
	    const baseName = sanitizeFileName(String(originalName || 'image').replace(/\.[^.]+$/, ''));
	    let name = baseName + suffix;
	    let index = 2;
	    while (usedNames[name.toLowerCase()]) {
	        name = baseName + '_' + index + suffix;
	        index++;
	    }
	    usedNames[name.toLowerCase()] = true;
	    return name;
	}

	const CRC32_TABLE = (() => {
	    const table = new Uint32Array(256);
	    for (let i = 0; i < 256; i++) {
	        let c = i;
	        for (let k = 0; k < 8; k++) {
	            c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
	        }
	        table[i] = c >>> 0;
	    }
	    return table;
	})();

	function crc32(bytes) {
	    let crc = 0xFFFFFFFF;
	    for (let i = 0; i < bytes.length; i++) {
	        crc = CRC32_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
	    }
	    return (crc ^ 0xFFFFFFFF) >>> 0;
	}

	function getDosDateTime(date) {
	    const year = Math.max(1980, date.getFullYear());
	    const dosTime = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
	    const dosDate = ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
	    return { dosTime, dosDate };
	}

	function createZipBlob(entries) {
	    const encoder = new TextEncoder();
	    const localParts = [];
	    const centralParts = [];
	    const now = getDosDateTime(new Date());
	    let offset = 0;
	    let centralSize = 0;

	    entries.forEach(entry => {
	        const nameBytes = encoder.encode(entry.name);
	        const data = entry.data;
	        const crc = crc32(data);

	        const localHeader = new Uint8Array(30);
	        const localView = new DataView(localHeader.buffer);
	        localView.setUint32(0, 0x04034b50, true);
	        localView.setUint16(4, 20, true);
	        localView.setUint16(6, 0x0800, true);
	        localView.setUint16(8, 0, true);
	        localView.setUint16(10, now.dosTime, true);
	        localView.setUint16(12, now.dosDate, true);
	        localView.setUint32(14, crc, true);
	        localView.setUint32(18, data.length, true);
	        localView.setUint32(22, data.length, true);
	        localView.setUint16(26, nameBytes.length, true);
	        localView.setUint16(28, 0, true);
	        localParts.push(localHeader, nameBytes, data);

	        const centralHeader = new Uint8Array(46);
	        const centralView = new DataView(centralHeader.buffer);
	        centralView.setUint32(0, 0x02014b50, true);
	        centralView.setUint16(4, 20, true);
	        centralView.setUint16(6, 20, true);
	        centralView.setUint16(8, 0x0800, true);
	        centralView.setUint16(10, 0, true);
	        centralView.setUint16(12, now.dosTime, true);
	        centralView.setUint16(14, now.dosDate, true);
	        centralView.setUint32(16, crc, true);
	        centralView.setUint32(20, data.length, true);
	        centralView.setUint32(24, data.length, true);
	        centralView.setUint16(28, nameBytes.length, true);
	        centralView.setUint16(30, 0, true);
	        centralView.setUint16(32, 0, true);
	        centralView.setUint16(34, 0, true);
	        centralView.setUint16(36, 0, true);
	        centralView.setUint32(38, 0, true);
	        centralView.setUint32(42, offset, true);
	        centralParts.push(centralHeader, nameBytes);

	        offset += localHeader.length + nameBytes.length + data.length;
	        centralSize += centralHeader.length + nameBytes.length;
	    });

	    const endHeader = new Uint8Array(22);
	    const endView = new DataView(endHeader.buffer);
	    endView.setUint32(0, 0x06054b50, true);
	    endView.setUint16(4, 0, true);
	    endView.setUint16(6, 0, true);
	    endView.setUint16(8, entries.length, true);
	    endView.setUint16(10, entries.length, true);
	    endView.setUint32(12, centralSize, true);
	    endView.setUint32(16, offset, true);
	    endView.setUint16(20, 0, true);

	    return new Blob([...localParts, ...centralParts, endHeader], { type: 'application/zip' });
	}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }, 1000);
}

// ===== 等待图片加载完成 =====
function waitImageLoaded(item) {
    return new Promise((resolve, reject) => {
        if (item.img && item.img.complete && item.img.naturalWidth > 0) {
            resolve(item.img);
            return;
        }
        const img = new Image();
        img.onload = () => { item.img = img; resolve(img); };
        img.onerror = () => reject(new Error('图片加载失败：' + item.name));
        img.src = item.thumbUrl;
    });
}

	// ===== 解密核心 =====
	function decryptImage(img, pwd, blockSize) {
	    let padW, padH, origW, origH;
	    const extractedInfo = tryExtractFromImage(img);

	    if (extractedInfo) {
	        padW = extractedInfo.padWidth;
	        padH = extractedInfo.padHeight;
	        origW = extractedInfo.origWidth;
	        origH = extractedInfo.origHeight;
	        blockSize = extractedInfo.blockSize;
	        pwd = extractedInfo.password;
	    } else {
	        if (!pwd) throw new Error('未检测到嵌入密码，请输入安全密码');

	        const cols = Math.ceil(img.width / blockSize);
	        const rows = Math.ceil(img.height / blockSize);
	        padW = cols * blockSize;
	        padH = rows * blockSize;
	        origW = img.width;
	        origH = img.height;

	        if (img.width !== padW || img.height !== padH) {
	            padW = img.width;
	            padH = img.height;
	            origW = padW;
	            origH = padH;
	        }
	    }

	    const cols = padW / blockSize;
	    const rows = padH / blockSize;
	    const totalBlocks = cols * rows;

	    const srcCanvas = document.createElement('canvas');
	    srcCanvas.width = padW;
	    srcCanvas.height = padH;
	    const srcCtx = srcCanvas.getContext('2d');
	    srcCtx.drawImage(img, 0, 0, padW, padH, 0, 0, padW, padH);

	    const indices = generateShuffleIndices(pwd, totalBlocks);

	    const outCanvas = document.createElement('canvas');
	    outCanvas.width = origW;
	    outCanvas.height = origH;
	    const outCtx = outCanvas.getContext('2d');

	    for (let i = 0; i < totalBlocks; i++) {
	        const srcIdx = indices[i];
	        const dstIdx = i;
	        const srcX = (srcIdx % cols) * blockSize;
	        const srcY = Math.floor(srcIdx / cols) * blockSize;
	        const dstX = (dstIdx % cols) * blockSize;
	        const dstY = Math.floor(dstIdx / cols) * blockSize;
	        outCtx.drawImage(srcCanvas, srcX, srcY, blockSize, blockSize, dstX, dstY, blockSize, blockSize);
	    }

	    return {
	        dataURL: outCanvas.toDataURL('image/png'),
	        usedEmbeddedPassword: !!extractedInfo
	    };
	}

// ===== 批量处理 =====
document.getElementById('processBtn').addEventListener('click', startBatchProcess);

async function startBatchProcess() {
    if (!fileItems.length) return alert('请先添加图片！');
    const pwd = document.getElementById('password').value;
    let blockSize = parseInt(document.getElementById('blockSize').value);
    if (isNaN(blockSize) || blockSize < 2 || blockSize > 100) blockSize = 10;

    const processBtn = document.getElementById('processBtn');
    processBtn.disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('downloadAllBtn').style.display = 'none';
    hideStatus();

    let successCount = 0;
    let failCount = 0;

    for (let i = 0; i < fileItems.length; i++) {
        const item = fileItems[i];
        item.status = 'processing';
        item.statusText = '处理中...';
        renderFileList();

        try {
            const img = await waitImageLoaded(item);
            // 让UI有机会刷新
            await new Promise(r => setTimeout(r, 10));
            const result = decryptImage(img, pwd, blockSize);
            item.outputDataURL = result.dataURL;
            item.status = 'success';
            item.statusText = result.usedEmbeddedPassword ? '✓ 解密完成（已自动识别）' : '✓ 解密完成';
            successCount++;
        } catch (err) {
            console.error(err);
            item.status = 'error';
            item.statusText = '✕ 失败：' + err.message;
            failCount++;
        }

        const progress = ((i + 1) / fileItems.length * 100).toFixed(1);
        document.getElementById('progressBar').style.width = progress + '%';
        renderFileList();
    }

    processBtn.disabled = false;
    document.getElementById('loading').style.display = 'none';

    if (successCount > 0) {
        showStatus(`🔐 批量解密完成！成功 ${successCount} 张${failCount > 0 ? '，失败 ' + failCount + ' 张' : ''}`, failCount > 0 ? 'info' : 'success');
        document.getElementById('downloadAllBtn').style.display = 'block';
    } else {
        showStatus(`❌ 全部失败（${failCount} 张）`, 'error');
    }
}

	// ===== 批量下载 =====
	document.getElementById('downloadAllBtn').addEventListener('click', async function() {
	    const successItems = fileItems.filter(it => it.status === 'success' && it.outputDataURL);
	    if (!successItems.length) return;

	    this.disabled = true;
	    const origText = this.textContent;

	    try {
	        this.textContent = `📦 正在打包 ${successItems.length} 张...`;
	        const usedNames = {};
	        const entries = successItems.map(item => ({
	            name: getUniqueZipName(item.name, '_decode.png', usedNames),
	            data: dataURLToBytes(item.outputDataURL)
	        }));
	        const zipBlob = createZipBlob(entries);
	        const stamp = new Date().toISOString().slice(0, 19).replace(/[-:T]/g, '');
	        downloadBlob(zipBlob, 'decrypted_images_' + stamp + '.zip');
	        showStatus(`✅ 已生成压缩包，包含 ${successItems.length} 张解密图片`, 'success');
	    } catch (err) {
	        console.error('压缩包生成失败', err);
	        showStatus('❌ 压缩包生成失败：' + err.message, 'error');
	    } finally {
	        this.textContent = origText;
	        this.disabled = false;
	    }
	});

hideStatus();
</script>
